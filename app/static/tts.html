<!DOCTYPE html>
<html lang="ky">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Текст -> Үн — Кыргыз AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0a0c10;
      --bg1: #12161e;
      --panel: rgba(255, 255, 255, 0.04);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #f0b429;
      --accent-dim: #c49a22;
      --glow: rgba(240, 180, 41, 0.35);
      --user-bg: linear-gradient(135deg, #1e2636 0%, #252d3d 100%);
      --ai-bg: linear-gradient(135deg, #1a2218 0%, #1e2a1c 100%);
      --danger: #e85d5d;
      --ok: #4ade80;
      --radius: 16px;
      --font: "Outfit", system-ui, sans-serif;
      --mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg0);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .noise {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 100% 80% at 10% -20%, rgba(240, 180, 41, 0.12), transparent 50%),
        radial-gradient(ellipse 70% 50% at 100% 0%, rgba(100, 140, 255, 0.08), transparent 45%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(232, 93, 93, 0.06), transparent 50%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1.25rem 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 0.75rem; }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(145deg, #f0b429 0%, #d4921a 100%);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #1a1408;
      box-shadow: 0 0 32px var(--glow);
    }

    .brand h1 { font-size: 1.35rem; font-weight: 600; letter-spacing: -0.02em; }
    .brand p { font-size: 0.8rem; color: var(--muted); font-weight: 400; }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 2s ease infinite;
    }

    .status-dot.ok {
      background: var(--ok);
      box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
      animation: none;
    }

    .status-dot.warn {
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .content {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .welcome {
      text-align: center;
      padding: 1rem 0.5rem 0.25rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel-block {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.22);
      padding: 1rem;
    }

    .panel-block h2 {
      font-size: 0.85rem;
      color: var(--accent-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      resize: none;
      min-height: 120px;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: rgba(240, 180, 41, 0.4);
      box-shadow: 0 0 0 3px rgba(240, 180, 41, 0.12);
    }

    .model-toggle {
      display: flex;
      gap: 0.45rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.25rem;
      border-radius: 999px;
      align-items: center;
    }

    .model-btn {
      border: none;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.78rem;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .model-btn:hover:not(.active) { transform: translateY(-1px); color: #c9d2e4; }

    .model-btn.active {
      background: rgba(240, 180, 41, 0.16);
      color: #f7ddb1;
      box-shadow: 0 0 0 1px rgba(240, 180, 41, 0.22) inset;
    }

    .row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    button.send {
      flex-shrink: 0;
      min-width: 52px;
      height: 52px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, #f0b429 0%, #c49218 100%);
      color: #1a1408;
      display: grid;
      place-items: center;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px var(--glow);
    }

    button.send:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px var(--glow);
    }

    button.send:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .audio-box {
      margin-top: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .audio-box label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    audio { width: 100%; height: 40px; border-radius: 8px; }

    .err {
      margin-top: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      background: rgba(232, 93, 93, 0.12);
      border: 1px solid rgba(232, 93, 93, 0.25);
      color: #fca5a5;
      font-size: 0.85rem;
      font-family: var(--mono);
      white-space: pre-wrap;
    }

    .muted { color: var(--muted); font-size: 0.9rem; }

    footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    a { color: var(--accent-dim); }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <div class="noise"></div>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">Ү</div>
        <div>
          <h1>Текст -> Үн</h1>
          <p>Жөн гана аудио синтез</p>
        </div>
      </div>
      <div class="status" id="status" title="">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Текшерүү…</span>
      </div>
    </header>

    <main>
      <div class="content">
        <div class="welcome">
          Төмөндөгү кыргызча текстти жазыңыз жана үн чыгарып алыңыз.
        </div>

        <div class="panel-block">
          <h2>Киргизүү</h2>
          <textarea
            id="ttsText"
            placeholder="Мисалы: Салам, кыргызча кыскача билдирүү…"
          ></textarea>

          <div class="row" style="margin-top: 0.85rem;">
            <div class="model-toggle" aria-label="Үн модели">
              <button type="button" class="model-btn" data-model="female">Аял үн</button>
              <button type="button" class="model-btn" data-model="male">Эркек үн</button>
            </div>

            <button type="button" class="send" id="generate" aria-label="Үн чыгарып берүү">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5L6 9H2v6h4l5 4V5z" />
                <path d="M15 9a3 3 0 0 1 0 6" />
                <path d="M17.5 6.5a7 7 0 0 1 0 11" />
              </svg>
            </button>
          </div>

          <div id="err" class="err" style="display:none;"></div>

          <div class="audio-box" id="audioBox" style="display:none;">
            <label>Аудио</label>
            <audio controls preload="metadata" id="audioEl"></audio>
          </div>

          <div style="margin-top: 0.85rem; display:none;" id="cleanedWrap" class="muted">
            <div style="text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.35rem;">
              Тазаланган текст (синтезге колдонулган)
            </div>
            <div id="cleanedText" style="font-family: var(--mono); white-space: pre-wrap;"></div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <a href="/">Чат</a> · <a href="/health">/health</a> · <a href="/docs">API</a>
    </footer>
  </div>

  <script>
    const ttsText = document.getElementById("ttsText");
    const generateBtn = document.getElementById("generate");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const modelBtns = document.querySelectorAll(".model-btn");
    const modelKey = "tts_gender";
    let gender = localStorage.getItem(modelKey) || "female";

    const errEl = document.getElementById("err");
    const audioBox = document.getElementById("audioBox");
    const audioEl = document.getElementById("audioEl");
    const cleanedWrap = document.getElementById("cleanedWrap");
    const cleanedTextEl = document.getElementById("cleanedText");

    function setGender(g) {
      gender = g;
      localStorage.setItem(modelKey, gender);
      modelBtns.forEach((b) => {
        b.classList.toggle("active", b.dataset.model === gender);
      });
    }

    modelBtns.forEach((b) => {
      b.addEventListener("click", () => setGender(b.dataset.model));
    });
    setGender(gender);

    function setError(msg) {
      if (!msg) {
        errEl.style.display = "none";
        errEl.textContent = "";
        return;
      }
      errEl.style.display = "block";
      errEl.textContent = msg;
    }

    function setLoading(on) {
      generateBtn.disabled = on;
      ttsText.disabled = on;
    }

    async function refreshHealth() {
      try {
        const r = await fetch("/health");
        const j = await r.json();
        const femaleLoaded = j.models?.female?.loaded === true;
        const maleLoaded = j.models?.male?.loaded === true;
        const ttsOk = femaleLoaded || maleLoaded;
        statusDot.className = "status-dot" + (ttsOk ? " ok" : " warn");
        statusText.textContent = ttsOk ? "TTS даяр" : "TTS жок";
      } catch (e) {
        statusDot.className = "status-dot warn";
        statusText.textContent = "Тармак жок";
      }
    }

    async function submit() {
      const msg = ttsText.value.trim();
      if (!msg) return;

      setError("");
      audioBox.style.display = "none";
      cleanedWrap.style.display = "none";

      setLoading(true);
      try {
        const res = await fetch("/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: msg, model: gender }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setError(data.detail || "Ката кетти.");
          return;
        }

        audioBox.style.display = "block";
        audioEl.src = (data.audio_url || "") + "?" + Date.now();

        cleanedWrap.style.display = "block";
        cleanedTextEl.textContent = data.cleaned_text || data.kyrgyz_text || msg;
      } catch (e) {
        setError(String(e));
      } finally {
        setLoading(false);
        ttsText.focus();
      }
    }

    generateBtn.addEventListener("click", submit);
    ttsText.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        submit();
      }
    });

    refreshHealth();
    setInterval(refreshHealth, 30000);
  </script>
</body>
</html>
